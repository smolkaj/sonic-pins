name: "4ward DVaaS integration"

on:
  push:
    branches: [fourward-dvaas-integration]
  pull_request:
    branches: [main]
    paths:
      - 'fourward/**'
      - 'dvaas/**'

jobs:
  fourward-dvaas:
    name: DVaaS against 4ward
    runs-on: ubuntu-24.04
    # Prevent rules_android from finding the pre-installed SDK on CI runners.
    env:
      ANDROID_HOME: ""
      ANDROID_SDK_ROOT: ""

    steps:
    - name: Checkout sonic-pins
      uses: actions/checkout@v3
      with:
        path: sonic-pins

    - name: Checkout 4ward
      uses: actions/checkout@v3
      with:
        repository: smolkaj/4ward
        ref: dvaas-integration
        path: fourward

    - name: Free disk space
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        large-packages: false

    - name: Install system dependencies (sonic-pins)
      run: cd sonic-pins && ./install_dependencies.sh

    # 4ward's BMv2 differential tests need libgmp; not needed for the server
    # itself, but the build graph may pull it in.
    - name: Install system dependencies (4ward)
      run: sudo apt-get install -y libgmp-dev

    - name: Install bazelisk
      run: |
        ARCH=$(dpkg --print-architecture)
        sudo curl -fsSL -o /usr/local/bin/bazel \
          https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-${ARCH}
        sudo chmod +x /usr/local/bin/bazel

    - name: Build 4ward server and SAI P4 pipeline
      working-directory: fourward
      run: |
        bazel build //p4runtime:p4runtime_server //e2e_tests/sai_p4:sai_middleblock_pb

    - name: Start two 4ward servers
      working-directory: fourward
      run: |
        PIPELINE=$(bazel info bazel-bin)/e2e_tests/sai_p4/sai_middleblock.txtpb

        # SUT: device_id=1, port=9559
        bazel run //p4runtime:p4runtime_server -- \
            --port=9559 --device-id=1 --pipeline="$PIPELINE" &
        SUT_PID=$!

        # Control switch: device_id=2, port=9560
        bazel run //p4runtime:p4runtime_server -- \
            --port=9560 --device-id=2 --pipeline="$PIPELINE" &
        CTRL_PID=$!

        # Wait for both servers to be ready.
        for port in 9559 9560; do
          for i in $(seq 1 30); do
            if nc -z localhost $port 2>/dev/null; then
              echo "Server on port $port is ready"
              break
            fi
            sleep 1
          done
        done

        echo "SUT_PID=$SUT_PID" >> "$GITHUB_ENV"
        echo "CTRL_PID=$CTRL_PID" >> "$GITHUB_ENV"

    - name: Build and run DVaaS test
      working-directory: sonic-pins
      run: |
        mkdir -p /tmp/repo-cache
        bazel test //fourward:fourward_dvaas_test \
          --repository_cache=/tmp/repo-cache \
          --test_output=all \
          --test_arg=--sut_address=localhost:9559 \
          --test_arg=--control_address=localhost:9560 \
          --test_arg=--sut_device_id=1 \
          --test_arg=--control_device_id=2

    - name: Stop 4ward servers
      if: always()
      run: |
        kill $SUT_PID $CTRL_PID 2>/dev/null || true
        wait $SUT_PID $CTRL_PID 2>/dev/null || true
