// Minimal proto definitions for 4ward's DataplaneService.
//
// These are a subset of 4ward's simulator.proto and dataplane.proto, containing
// only what's needed for the PacketBridge and DataplaneValidationBackend.
//
// For the full definitions, see:
//   https://github.com/smolkaj/4ward/blob/main/p4runtime/dataplane.proto
//   https://github.com/smolkaj/4ward/blob/main/simulator/simulator.proto

syntax = "proto3";

package fourward.dataplane;

service Dataplane {
  // Inject a single packet into the data plane. Returns the result inline.
  rpc InjectPacket(InjectPacketRequest) returns (InjectPacketResponse);

  // Observe results from ALL injection sources. Each result bundles the input
  // with all its outputs.
  rpc SubscribeResults(SubscribeResultsRequest)
      returns (stream SubscribeResultsResponse);
}

message InputPacket {
  uint32 dataplane_ingress_port = 1;
  bytes payload = 2;
  // Only populated when port translation is available.
  bytes p4rt_ingress_port = 3;
}

message OutputPacket {
  uint32 dataplane_egress_port = 1;
  bytes payload = 2;
  // Only populated when port translation is available.
  bytes p4rt_egress_port = 3;
}

message InjectPacketRequest {
  oneof ingress_port {
    // Dataplane port number (e.g. 0, 1, 510).
    uint32 dataplane_ingress_port = 1;
    // P4Runtime port ID — opaque bytes whose encoding depends on
    // @p4runtime_translation. Requires a loaded pipeline with port
    // translation; otherwise the RPC fails with FAILED_PRECONDITION.
    bytes p4rt_ingress_port = 2;
  }
  bytes payload = 3;
}

message InjectPacketResponse {
  repeated OutputPacket output_packets = 1;
  // Opaque trace tree from 4ward's simulator (for debugging).
  bytes trace = 2;
}

message ProcessPacketResult {
  InputPacket input_packet = 1;
  repeated OutputPacket output_packets = 2;
  // trace field omitted.
}

message SubscribeResultsRequest {}

message SubscribeResultsResponse {
  oneof event {
    SubscriptionActive active = 1;
    ProcessPacketResult result = 2;
  }
}

message SubscriptionActive {}
